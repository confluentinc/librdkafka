version: v1.0
name: run-single-broker-tests

agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-00

execution_time_limit:
  hours: 3

global_job_config:
  prologue:
    commands:
      - 'export TEST_KAFKA_VERSION="${TEST_KAFKA_VERSION:-4.2.0}"'
      - 'export TEST_CP_VERSION="${TEST_CP_VERSION:-8.2.0}"'
      - checkout
      - '[[ -z "$GIT_REF" ]] || git checkout $GIT_REF'
      - wget -O rapidjson-dev.deb https://launchpad.net/ubuntu/+archive/primary/+files/rapidjson-dev_1.1.0+dfsg2-3_all.deb
      - sudo dpkg -i rapidjson-dev.deb
      - sudo apt update
      - sudo apt remove -y needrestart
      - sudo apt install -y valgrind
      - python3 -m pip install -U pip
      - python3 -m pip -V
      - (cd tests && python3 -m pip install -r requirements.txt)
      - ./configure --install-deps --enable-werror --enable-devel
      - make -j all
      - make -j -C tests build
      - sem-version java 17

blocks:
  - name: "Single broker tests (x86_64)"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-amd64-1
      prologue:
        commands:
          - if [[ "$TEST_ARCHES" != *"x86_64"* ]]; then exit 0; fi
      jobs:
        - name: "PLAINTEXT single broker (x86_64)"
          commands:
            - if [[ "$TEST_TYPE" != *"plaintext"* ]]; then exit 0; fi
            - (cd tests && python3 -m trivup.clusters.KafkaCluster --kraft
              --version ${TEST_KAFKA_VERSION} --cpversion ${TEST_CP_VERSION}
              --brokers 1
              --conf '["share.coordinator.state.topic.replication.factor=1", "share.coordinator.state.topic.min.isr=1"]'
              --cmd 'TESTS_SKIP_BEFORE=0170 python3 run-test-batches.py')
        - name: "SSL single broker (x86_64)"
          commands:
            - if [[ "$TEST_TYPE" != *"ssl"* ]]; then exit 0; fi
            - (cd tests && python3 -m trivup.clusters.KafkaCluster --kraft --ssl
              --version ${TEST_KAFKA_VERSION} --cpversion ${TEST_CP_VERSION}
              --brokers 1
              --conf '["share.coordinator.state.topic.replication.factor=1", "share.coordinator.state.topic.min.isr=1"]'
              --cmd 'TESTS_SKIP_BEFORE=0170 python3 run-test-batches.py')
  - name: "Single broker tests (aarch64)"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-arm64-1
      prologue:
        commands:
          - if [[ "$TEST_ARCHES" != *"aarch64"* ]]; then exit 0; fi
      jobs:
        - name: "PLAINTEXT single broker (aarch64)"
          commands:
            - if [[ "$TEST_TYPE" != *"plaintext"* ]]; then exit 0; fi
            - (cd tests && python3 -m trivup.clusters.KafkaCluster --kraft
              --version ${TEST_KAFKA_VERSION} --cpversion ${TEST_CP_VERSION}
              --brokers 1
              --conf '["share.coordinator.state.topic.replication.factor=1", "share.coordinator.state.topic.min.isr=1"]'
              --cmd 'TESTS_SKIP_BEFORE=0170 python3 run-test-batches.py')
        - name: "SSL single broker (aarch64)"
          commands:
            - if [[ "$TEST_TYPE" != *"ssl"* ]]; then exit 0; fi
            - (cd tests && python3 -m trivup.clusters.KafkaCluster --kraft --ssl
              --version ${TEST_KAFKA_VERSION} --cpversion ${TEST_CP_VERSION}
              --brokers 1
              --conf '["share.coordinator.state.topic.replication.factor=1", "share.coordinator.state.topic.min.isr=1"]'
              --cmd 'TESTS_SKIP_BEFORE=0170 python3 run-test-batches.py')
